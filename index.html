var currentQuestion=0,correctAnswers=0,answered=false,selectedOptions=[],activeQuestions=[],wrongAnswers=[];
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
document.getElementById('start-btn').addEventListener('click',function(){
var n=document.getElementById('num-questions').value;
var all=quizData.slice();shuffle(all);
activeQuestions=n==='all'?all:all.slice(0,parseInt(n));
currentQuestion=0;correctAnswers=0;wrongAnswers=[];
document.getElementById('config-section').style.display='none';
document.getElementById('quiz-content').style.display='block';
loadQuestion();
});
function loadQuestion(){
answered=false;selectedOptions=[];
var q=activeQuestions[currentQuestion];
var isM=q.correct.length>1;
document.getElementById('progress-fill').style.width=(currentQuestion/activeQuestions.length*100)+'%';
document.getElementById('progress-text').textContent='Pregunta '+(currentQuestion+1)+' de '+activeQuestions.length;
var t=document.getElementById('question-type');
t.className=isM?'question-type type-multiple':'question-type type-single';
t.textContent=isM?'Seleccion multiple (varias respuestas)':'Seleccion unica';
document.getElementById('question-text').textContent=q.q;
var list=document.getElementById('options-list');list.innerHTML='';
q.options.forEach(function(opt,idx){
var li=document.createElement('li');li.className='option-item';
var btn=document.createElement('button');btn.className='option-btn';
btn.textContent=String.fromCharCode(65+idx)+'. '+opt;
btn.addEventListener('click',function(){selectOption(idx,isM);});
li.appendChild(btn);list.appendChild(li);
});
document.getElementById('submit-btn').style.display=isM?'inline-block':'none';
document.getElementById('feedback').style.display='none';
document.getElementById('next-btn').style.display='none';
}
function selectOption(idx,isM){
if(answered)return;
var btns=document.getElementById('options-list').querySelectorAll('.option-btn');
if(!isM){selectedOptions=[idx];checkAnswer();}
else{var p=selectedOptions.indexOf(idx);
if(p>-1){selectedOptions.splice(p,1);btns[idx].classList.remove('selected');}
else{selectedOptions.push(idx);btns[idx].classList.add('selected');}
}}
document.getElementById('submit-btn').addEventListener('click',function(){if(selectedOptions.length>0&&!answered)checkAnswer();});
function checkAnswer(){
answered=true;
var q=activeQuestions[currentQuestion];
var btns=document.getElementById('options-list').querySelectorAll('.option-btn');
btns.forEach(function(b){b.classList.add('disabled');});
document.getElementById('submit-btn').style.display='none';
var ok=selectedOptions.length===q.correct.length&&selectedOptions.every(function(s){return q.correct.indexOf(s)>-1;});
q.correct.forEach(function(c){btns[c].classList.add('correct');});
selectedOptions.forEach(function(s){if(q.correct.indexOf(s)===-1)btns[s].classList.add('incorrect');});
if(!ok){q.correct.forEach(function(c){if(selectedOptions.indexOf(c)===-1)btns[c].classList.add('missed');});}
var fb=document.getElementById('feedback');
if(ok){correctAnswers++;fb.style.display='block';fb.style.background='#e6f4ea';fb.style.borderLeft='4px solid #0f9d58';fb.style.color='#1e4620';fb.textContent='Correcto!';}
else{wrongAnswers.push({question:q.q,options:q.options,correct:q.correct,selected:selectedOptions.slice(),explanation:q.explanation});
fb.style.display='block';fb.style.background='#fce8e6';fb.style.borderLeft='4px solid #db4437';fb.style.color='#5f2120';fb.textContent='Incorrecto. '+q.explanation;}
document.getElementById('next-btn').style.display='inline-block';
document.getElementById('next-btn').textContent=currentQuestion<activeQuestions.length-1?'Siguiente':'Ver resultados';
}
document.getElementById('next-btn').addEventListener('click',function(){currentQuestion++;if(currentQuestion<activeQuestions.length)loadQuestion();else showResults();});
function showResults(){
document.getElementById('quiz-content').style.display='none';
document.getElementById('results').style.display='block';
var pct=Math.round(correctAnswers/activeQuestions.length*100);
document.getElementById('score').textContent=correctAnswers+' / '+activeQuestions.length;
document.getElementById('percentage').textContent=pct+'%';
var m='';if(pct>=90)m='Excelente! Muy bien preparado.';else if(pct>=70)m='Buen trabajo! Repasa donde fallaste.';else if(pct>=50)m='Necesitas repasar. Sigue estudiando.';else m='Requieres estudio adicional.';
document.getElementById('results-message').textContent=m;
}
document.getElementById('restart-btn').addEventListener('click',function(){document.getElementById('results').style.display='none';document.getElementById('config-section').style.display='block';});
document.getElementById('review-btn').addEventListener('click',function(){
document.getElementById('results').style.display='none';document.getElementById('review-section').style.display='block';
var h='';if(wrongAnswers.length===0){h='<p style="text-align:center;color:#0f9d58;">No tuviste errores!</p>';}
else{wrongAnswers.forEach(function(w,i){
h+='<div style="border:1px solid #e0e0e0;border-radius:8px;padding:15px;margin-bottom:15px;">';
h+='<p style="font-weight:600;margin-bottom:10px;">'+(i+1)+'. '+w.question+'</p>';
w.options.forEach(function(opt,idx){var mk='';if(w.correct.indexOf(idx)>-1)mk=' [CORRECTA]';if(w.selected.indexOf(idx)>-1&&w.correct.indexOf(idx)===-1)mk=' [TU RESPUESTA]';
var cl=w.correct.indexOf(idx)>-1?'#0f9d58':(w.selected.indexOf(idx)>-1?'#db4437':'#333');
h+='<p style="margin-left:15px;margin-bottom:4px;color:'+cl+';">'+String.fromCharCode(65+idx)+'. '+opt+mk+'</p>';});
h+='<p style="margin-top:10px;font-size:0.85rem;color:#5f6368;background:#f5f5f5;padding:10px;border-radius:6px;">'+w.explanation+'</p></div>';});}
document.getElementById('review-content').innerHTML=h;
});
document.getElementById('back-results-btn').addEventListener('click',function(){document.getElementById('review-section').style.display='none';document.getElementById('results').style.display='block';});
document.getElementById('finish-btn').addEventListener('click',function(){activeQuestions=activeQuestions.slice(0,currentQuestion+(answered?1:0));showResults();});
</script>
