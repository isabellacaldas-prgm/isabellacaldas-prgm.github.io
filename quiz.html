<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --board:#1b3a30;
    --board-dark:#153027;
    --card:#20443a;
    --chalk:#f2efe0;
    --chalk-dim:#c9d6cd;
    --yellow:#e8c547;
    --green:#7bc47f;
    --coral:#e2725b;
    --line:rgba(242,239,224,0.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(ellipse at top left, rgba(255,255,255,0.03), transparent 55%),
      radial-gradient(ellipse at bottom right, rgba(255,255,255,0.025), transparent 55%),
      var(--board);
    font-family:'Work Sans', sans-serif;
    color:var(--chalk);
    padding:32px 16px;
  }
  .wrap{
    width:100%;
    max-width:620px;
  }
  .eyebrow{
    font-family:'Kalam', cursive;
    font-size:15px;
    color:var(--yellow);
    letter-spacing:0.02em;
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
  }
  .eyebrow .dash{
    flex:1;
    height:1px;
    background:linear-gradient(to right, var(--yellow), transparent);
  }
  h1{
    font-family:'Kalam', cursive;
    font-weight:700;
    font-size:clamp(26px,5vw,34px);
    margin:0 0 6px 0;
    line-height:1.15;
  }
  .underline{
    width:120px;
    height:10px;
    margin-bottom:22px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:28px 26px 24px;
    box-shadow:0 18px 40px -18px rgba(0,0,0,0.55);
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size:14px 14px;
    pointer-events:none;
  }
  .progress-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
    font-size:13px;
    color:var(--chalk-dim);
  }
  .dots{
    display:flex;
    gap:7px;
  }
  .dot{
    width:9px;height:9px;border-radius:50%;
    background:rgba(242,239,224,0.22);
    transition:background .25s, transform .25s;
  }
  .dot.done{ background:var(--yellow); }
  .dot.current{ background:var(--chalk); transform:scale(1.3); }

  .question{
    font-size:19px;
    font-weight:600;
    line-height:1.45;
    margin:0 0 20px 0;
    position:relative;
  }
  .options{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .option{
    text-align:left;
    background:rgba(242,239,224,0.04);
    border:1.5px solid var(--line);
    color:var(--chalk);
    font-family:'Work Sans', sans-serif;
    font-size:15.5px;
    padding:13px 16px;
    border-radius:9px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:12px;
    transition:border-color .15s, background .15s, transform .1s;
  }
  .option:hover:not(:disabled){
    border-color:var(--yellow);
    background:rgba(232,197,71,0.07);
  }
  .option:active:not(:disabled){ transform:scale(0.995); }
  .option .letter{
    font-family:'Kalam', cursive;
    font-weight:700;
    font-size:15px;
    width:26px;height:26px;
    border-radius:50%;
    border:1.5px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .option:disabled{ cursor:default; }
  .option.correct{
    border-color:var(--green);
    background:rgba(123,196,127,0.12);
  }
  .option.correct .letter{ border-color:var(--green); background:var(--green); color:var(--board-dark); }
  .option.wrong{
    border-color:var(--coral);
    background:rgba(226,114,91,0.12);
  }
  .option.wrong .letter{ border-color:var(--coral); background:var(--coral); color:var(--board-dark); }
  .option.faded{ opacity:0.45; }

  .feedback{
    margin-top:18px;
    border-radius:10px;
    padding:14px 16px;
    font-size:14.5px;
    line-height:1.55;
    display:none;
    animation:rise .25s ease;
  }
  @keyframes rise{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .feedback.show{ display:block; }
  .feedback.good{ background:rgba(123,196,127,0.12); border:1px solid rgba(123,196,127,0.35); }
  .feedback.bad{ background:rgba(226,114,91,0.12); border:1px solid rgba(226,114,91,0.35); }
  .feedback .tag{
    font-family:'Kalam', cursive;
    font-weight:700;
    font-size:15px;
    display:block;
    margin-bottom:4px;
  }
  .feedback.good .tag{ color:var(--green); }
  .feedback.bad .tag{ color:var(--coral); }

  .footer-row{
    margin-top:22px;
    display:flex;
    justify-content:flex-end;
  }
  .next-btn{
    font-family:'Work Sans', sans-serif;
    font-weight:600;
    font-size:14.5px;
    background:var(--yellow);
    color:var(--board-dark);
    border:none;
    padding:11px 22px;
    border-radius:8px;
    cursor:pointer;
    opacity:0;
    pointer-events:none;
    transform:translateY(4px);
    transition:opacity .2s, transform .2s;
  }
  .next-btn.show{ opacity:1; pointer-events:auto; transform:translateY(0); }
  .next-btn:hover{ filter:brightness(1.06); }

  .result{
    text-align:center;
    display:none;
  }
  .result.show{ display:block; }
  .result .score{
    font-family:'Kalam', cursive;
    font-size:48px;
    color:var(--yellow);
    margin:6px 0 4px;
  }
  .result p{ color:var(--chalk-dim); margin:0 0 20px; font-size:15px; }
  .restart-btn{
    font-family:'Work Sans', sans-serif;
    font-weight:600;
    background:transparent;
    color:var(--chalk);
    border:1.5px solid var(--line);
    padding:11px 22px;
    border-radius:8px;
    cursor:pointer;
    transition:border-color .15s;
  }
  .restart-btn:hover{ border-color:var(--yellow); }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">QUIZ<span class="dash"></span><span id="counter">1 / 5</span></div>
  <h1 id="quizTitle">Título del quiz</h1>
  <svg class="underline" viewBox="0 0 120 10"><path d="M2 6 Q 30 -2, 60 6 T 118 6" stroke="#e8c547" stroke-width="3" fill="none" stroke-linecap="round"/></svg>

  <div class="card">
    <div id="quizBody">
      <div class="progress-row">
        <span id="progressLabel">Pregunta 1 de 5</span>
        <div class="dots" id="dots"></div>
      </div>
      <p class="question" id="questionText"></p>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback">
        <span class="tag" id="feedbackTag"></span>
        <span id="feedbackText"></span>
      </div>
      <div class="footer-row">
        <button class="next-btn" id="nextBtn">Siguiente →</button>
      </div>
    </div>

    <div class="result" id="result">
      <div class="eyebrow" style="justify-content:center;">RESULTADO</div>
      <div class="score" id="scoreText">0 / 5</div>
      <p id="scoreMsg">¡Buen trabajo!</p>
      <button class="restart-btn" id="restartBtn">Volver a intentar</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// EDITA AQUÍ TUS PREGUNTAS. "correct" es el índice (0,1,2,3...)
// de la opción correcta dentro de "options".
// ============================================================
const QUIZ_TITLE = "Título del quiz";
const QUESTIONS = [
  {
    question: "¿Cuál es la capital de Francia?",
    options: ["Madrid", "París", "Roma", "Lisboa"],
    correct: 1,
    explanation: "París es la capital de Francia desde hace siglos y sede del gobierno nacional."
  },
  {
    question: "¿Cuánto es 7 x 8?",
    options: ["54", "56", "64", "48"],
    correct: 1,
    explanation: "7 x 8 = 56. Puedes verificarlo sumando 7 ocho veces: 7+7+7+7+7+7+7+7 = 56."
  },
  {
    question: "¿Qué planeta es conocido como el planeta rojo?",
    options: ["Venus", "Júpiter", "Marte", "Saturno"],
    correct: 2,
    explanation: "Marte se llama así por el color rojizo de su superficie, causado por óxido de hierro."
  },
  {
    question: "¿Quién escribió 'Cien años de soledad'?",
    options: ["Mario Vargas Llosa", "Gabriel García Márquez", "Pablo Neruda", "Julio Cortázar"],
    correct: 1,
    explanation: "Gabriel García Márquez publicó esta novela en 1967, obra cumbre del realismo mágico."
  },
  {
    question: "¿Cuál es el océano más grande del mundo?",
    options: ["Atlántico", "Índico", "Ártico", "Pacífico"],
    correct: 3,
    explanation: "El océano Pacífico cubre más superficie que todos los continentes juntos."
  }
];
// ============================================================

let current = 0;
let score = 0;
let answered = false;

const dotsEl = document.getElementById('dots');
const counterEl = document.getElementById('counter');
const progressLabel = document.getElementById('progressLabel');
const questionText = document.getElementById('questionText');
const optionsEl = document.getElementById('options');
const feedbackEl = document.getElementById('feedback');
const feedbackTag = document.getElementById('feedbackTag');
const feedbackText = document.getElementById('feedbackText');
const nextBtn = document.getElementById('nextBtn');
const quizBody = document.getElementById('quizBody');
const resultEl = document.getElementById('result');
const scoreText = document.getElementById('scoreText');
const scoreMsg = document.getElementById('scoreMsg');
const restartBtn = document.getElementById('restartBtn');

document.getElementById('quizTitle').textContent = QUIZ_TITLE;

function buildDots(){
  dotsEl.innerHTML = '';
  QUESTIONS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    dotsEl.appendChild(d);
  });
}

function updateDots(){
  [...dotsEl.children].forEach((d, i) => {
    d.classList.toggle('done', i < current);
    d.classList.toggle('current', i === current);
  });
}

const letters = ['A','B','C','D','E','F'];

function renderQuestion(){
  answered = false;
  feedbackEl.className = 'feedback';
  nextBtn.classList.remove('show');
  const q = QUESTIONS[current];
  counterEl.textContent = (current+1) + ' / ' + QUESTIONS.length;
  progressLabel.textContent = 'Pregunta ' + (current+1) + ' de ' + QUESTIONS.length;
  questionText.textContent = q.question;
  optionsEl.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = '<span class="letter">' + letters[i] + '</span><span>' + opt + '</span>';
    btn.addEventListener('click', () => selectOption(i, btn));
    optionsEl.appendChild(btn);
  });
  updateDots();
}

function selectOption(i, btn){
  if(answered) return;
  answered = true;
  const q = QUESTIONS[current];
  const allBtns = [...optionsEl.children];

  allBtns.forEach((b, idx) => {
    b.disabled = true;
    if(idx === q.correct){
      b.classList.add('correct');
    } else if(idx === i){
      b.classList.add('wrong');
    } else {
      b.classList.add('faded');
    }
  });

  if(i === q.correct){
    score++;
    feedbackEl.classList.add('good');
    feedbackTag.textContent = '✓ ¡Correcto!';
    feedbackText.textContent = q.explanation;
  } else {
    feedbackEl.classList.add('bad');
    feedbackTag.textContent = '✗ Incorrecto';
    feedbackText.textContent = q.explanation;
  }
  feedbackEl.classList.add('show');
  nextBtn.classList.add('show');
  nextBtn.textContent = (current === QUESTIONS.length - 1) ? 'Ver resultado →' : 'Siguiente →';
}

nextBtn.addEventListener('click', () => {
  current++;
  if(current >= QUESTIONS.length){
    showResult();
  } else {
    renderQuestion();
  }
});

function showResult(){
  quizBody.style.display = 'none';
  resultEl.classList.add('show');
  scoreText.textContent = score + ' / ' + QUESTIONS.length;
  const pct = score / QUESTIONS.length;
  let msg = '¡Sigue practicando!';
  if(pct === 1) msg = '¡Puntaje perfecto! Excelente trabajo.';
  else if(pct >= 0.7) msg = '¡Muy buen resultado!';
  else if(pct >= 0.4) msg = 'Vas por buen camino, repasa un poco más.';
  scoreMsg.textContent = msg;
}

restartBtn.addEventListener('click', () => {
  current = 0;
  score = 0;
  resultEl.classList.remove('show');
  quizBody.style.display = 'block';
  renderQuestion();
});

buildDots();
renderQuestion();
</script>
</body>
</html>
